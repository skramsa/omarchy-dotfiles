# Application bindings
$terminal = uwsm-app -- xdg-terminal-exec
$browser = omarchy-launch-browser

bindd = SUPER, RETURN, Terminal, exec, $terminal --working-directory="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, E, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER SHIFT, B, Browser, exec, $browser
bindd = SUPER SHIFT ALT, B, Browser (private), exec, $browser --private
bindd = SUPER SHIFT, M, Music, exec, omarchy-launch-or-focus spotify
bindd = SUPER SHIFT ALT, M, Music TUI, exec, omarchy-launch-or-focus-tui cliamp
bindd = SUPER SHIFT, N, Editor, exec, omarchy-launch-editor
bindd = SUPER SHIFT, T, Activity, exec, omarchy-launch-tui btop
# bindd = SUPER SHIFT, D, Docker, exec, omarchy-launch-tui lazydocker
# bindd = SUPER SHIFT, G, Signal, exec, omarchy-launch-or-focus signal "uwsm-app -- signal-desktop"
bindd = SUPER SHIFT, O, Obsidian, exec, omarchy-launch-or-focus "^obsidian$" "uwsm-app -- obsidian"

# If your web app url contains #, type it as ## to prevent hyprland treating it as a comment
# bindd = SUPER SHIFT, C, Calendar, exec, omarchy-launch-webapp "https://calendar.google.com/"
# bindd = SUPER SHIFT, E, Email, exec, omarchy-launch-webapp "https://mail.google.com/"
# bindd = SUPER SHIFT, Y, YouTube, exec, omarchy-launch-webapp "https://youtube.com/"

# Overwrite existing bindings, like putting Omarchy Menu on Super + Space
# unbind = SUPER, SPACE
# bindd = SUPER, SPACE, Omarchy menu, exec, omarchy-menu
unbind = SUPER, W
unbind = SUPER, K
unbind = SUPER SHIFT, LEFT
unbind = SUPER SHIFT, RIGHT
unbind = SUPER SHIFT, UP
unbind = SUPER SHIFT, DOWN
unbind = SUPER, code:20
unbind = SUPER, code:21
unbind = SUPER SHIFT, code:20
unbind = SUPER SHIFT, code:21
unbind = SUPER, F
unbind = SUPER SHIFT, F
unbind = SUPER CTRL, F

binddp = SUPER, code:10, Switch to workspace 1, workspace, 1
binddp = SUPER, code:11, Switch to workspace 2, workspace, 2
bindd = SUPER, Q, Close window, killactive,
bindd = SUPER SHIFT, Q, Kill window, exec, hyprctl kill
bindd = SUPER ALT, L, Lock the Screen, exec, omarchy-lock-screen
bindd = SUPER SHIFT, X, Show key bindings, exec, omarchy-menu-keybindings
# bindd = SUPER SHIFT, T, Activity, exec, $terminal -e btop
# bindd = SUPER SHIFT, D, Docker, exec, $terminal -e lazydocker

bindd = SUPER CTRL, LEFT, Swap window to the left, swapwindow, l
bindd = SUPER CTRL, RIGHT, Swap window to the right, swapwindow, r
bindd = SUPER CTRL, UP, Swap window up, swapwindow, u
bindd = SUPER CTRL, DOWN, Swap window down, swapwindow, d

# Resize active window
bindd = SUPER, Odiaeresis, Expand window left, resizeactive, -100 0    # - key
bindd = SUPER, Adiaeresis, Shrink window left, resizeactive, 100 0     # = key
bindd = SUPER SHIFT, Odiaeresis, Shrink window up, resizeactive, 0 -100
bindd = SUPER SHIFT, Adiaeresis, Expand window down, resizeactive, 0 100

bindd = SUPER, F, Full width, fullscreen, 1
binddp = SUPER SHIFT, F, Fullscreen, fullscreen, 0
bindd = SUPER CTRL, F, Tiled full screen, fullscreenstate, 0 2
